name: Bug report
description: Report a reproducible problem in the open engineering skills framework.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps, command, or artifact sequence that reproduces the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Codex surface, and relevant command output.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets, private paths, and customer data before posting.
