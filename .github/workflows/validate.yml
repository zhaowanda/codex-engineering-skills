name: validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Compile Python
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import py_compile
          paths = [p for p in Path('.').rglob('*.py') if '.git' not in p.parts and '__pycache__' not in p.parts]
          for path in paths:
              py_compile.compile(str(path), doraise=True)
          print(f"compiled {len(paths)} python files")
          PY
      - name: Run tests
        run: python -m pytest -q

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Lint hardened workflow modules
        run: ruff check skills/core/delivery-runner/scripts/workflow_contract.py skills/core/delivery-runner/scripts/governance_contract.py skills/core/delivery-case-capture/scripts/capture_case.py skills/core/auto-runner/scripts/agent_runtime.py tests/test_workflow_contract.py tests/test_agent_runtime.py
      - name: Type-check hardened contracts
        run: mypy skills/core/delivery-runner/scripts/workflow_contract.py skills/core/delivery-runner/scripts/governance_contract.py skills/core/delivery-case-capture/scripts/capture_case.py skills/core/auto-runner/scripts/agent_runtime.py
      - name: Security scan hardened contracts
        run: bandit -q skills/core/delivery-runner/scripts/workflow_contract.py skills/core/delivery-runner/scripts/governance_contract.py skills/core/delivery-case-capture/scripts/capture_case.py skills/core/auto-runner/scripts/agent_runtime.py
      - name: Coverage baseline
        run: python -m pytest -q --cov --cov-report=term-missing

  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Privacy scan
        run: python3 scripts/privacy_scan.py --root . --patterns config/private-patterns.example.yaml
      - name: Skill health
        run: python3 skills/core/skill-health/scripts/skill_health.py --root .
      - name: Open-source maturity checks
        run: |
          python3 scripts/codex_eng.py run contribution --root .
          python3 scripts/codex_eng.py run security-policy --root .
          python3 scripts/codex_eng.py run docs-site --root .
          python3 scripts/codex_eng.py run compatibility --root .
          python3 scripts/codex_eng.py run mcp-integration --root .
          python3 scripts/codex_eng.py run benchmark --root .
          python3 scripts/codex_eng.py run release-package --root .
          python3 scripts/codex_eng.py run deprecation --root .
          python3 scripts/codex_eng.py run roadmap --root .
          python3 scripts/codex_eng.py run docs-readability --root .
          python3 scripts/codex_eng.py run prompt-effectiveness --root .
