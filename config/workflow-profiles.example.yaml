schema: codex-workflow-profiles-v2
profiles:
  - name: bugfix
    governance_level: light
    target_artifact_reduction_percent: 30
    trigger_lanes:
      - bugfix
    required_skills:
      - requirement-document-ingestor
      - spec-governor
      - requirement-question-governor
      - technical-design-governor
      - architecture-design-governor
      - design-architecture-reviewer
      - test-design-governor
      - test-data-governor
      - delivery-plan-templates
      - traceability-governor
      - delivery-plan-reviewer
      - git-worktree-governor
      - edit-readiness-governor
      - workspace-write-guard
    optional_skills:
      - diff-impact-analyzer
      - test-evidence-gate
    expected_artifacts:
      - spec.json
      - requirement_ingestion.json
      - open_questions.json
      - technical_design.json
      - architecture_design.json
      - test_design.json
      - test_data_plan.json
      - design_architecture_review.json
      - delivery_plan.json
      - traceability_matrix.json
      - delivery_plan_review.json
      - docs_quality.json
      - git_worktree_evidence.json
      - edit_permit.json
      - write_guard_snapshot.json
    required_gate_artifacts:
      - artifact: spec.json
        accepted_decisions:
          - ready_for_design
          - pass
      - artifact: requirement_ingestion.json
        accepted_decisions:
          - ready
      - artifact: open_questions.json
        accepted_decisions:
          - pass
        digest_source: spec.json
        digest_path: spec_digest
      - artifact: technical_design.json
      - artifact: architecture_design.json
      - artifact: test_design.json
      - artifact: test_data_plan.json
      - artifact: docs_quality.json
        accepted_decisions:
          - pass
          - ready
      - artifact: design_architecture_review.json
        accepted_decisions:
          - pass
          - approved
        readiness_path: readiness_gate.implementation_allowed
        readiness_value: true
      - artifact: traceability_matrix.json
        accepted_decisions:
          - pass
      - artifact: delivery_plan_review.json
        accepted_decisions:
          - pass
        readiness_path: readiness_gate.implementation_allowed
        readiness_value: true
      - artifact: git_worktree_evidence.json
        accepted_decisions:
          - ready
      - artifact: edit_permit.json
        accepted_decisions:
          - ready
          - pass
      - artifact: write_guard_snapshot.json
        accepted_decisions:
          - ready
    next_safe_command: python3 skills/core/delivery-runner/scripts/delivery_runner.py inspect --artifact-dir artifacts/REQ-001
    notes:
      - required artifacts exist
      - delivery plan review passes
      - git evidence is ready
      - edit permit is ready
