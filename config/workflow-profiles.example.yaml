schema: codex-workflow-profiles-v1
profiles:
  - name: bugfix
    trigger_lanes:
      - bugfix
    required_skills:
      - requirement-document-ingestor
      - spec-governor
      - requirement-question-governor
      - technical-design-governor
      - test-design-governor
      - test-data-governor
      - design-architecture-reviewer
      - delivery-plan-templates
      - delivery-plan-reviewer
      - git-worktree-governor
      - edit-readiness-governor
    optional_skills:
      - diff-impact-analyzer
      - test-evidence-gate
    expected_artifacts:
      - spec.json
      - technical_design.json
      - test_design.json
      - test_data_plan.json
      - design_architecture_review.json
      - delivery_plan.json
      - delivery_plan_review.json
      - docs_quality.json
    required_gate_artifacts:
      - artifact: spec.json
        accepted_decisions:
          - ready_for_design
          - pass
      - artifact: technical_design.json
      - artifact: test_design.json
      - artifact: test_data_plan.json
      - artifact: docs_quality.json
        accepted_decisions:
          - pass
          - ready
      - artifact: design_architecture_review.json
        accepted_decisions:
          - pass
          - approved
        readiness_path: readiness_gate.implementation_allowed
        readiness_value: true
      - artifact: delivery_plan_review.json
        accepted_decisions:
          - pass
        readiness_path: readiness_gate.implementation_allowed
        readiness_value: true
    next_safe_command: python3 skills/core/delivery-runner/scripts/delivery_runner.py inspect --artifact-dir artifacts/REQ-001
    notes:
      - required artifacts exist
      - delivery plan review passes
      - git evidence is ready
      - edit permit is ready
  - name: small_feature
    trigger_lanes:
      - small_change
      - standard_requirement
      - large_prd
    required_skills:
      - requirement-document-ingestor
      - spec-governor
      - requirement-question-governor
      - technical-design-governor
      - architecture-design-governor
      - test-design-governor
      - test-data-governor
      - design-architecture-reviewer
      - delivery-plan-templates
      - delivery-plan-reviewer
    optional_skills:
      - traceability-governor
    expected_artifacts:
      - spec.json
      - technical_design.json
      - architecture_design.json
      - test_design.json
      - test_data_plan.json
      - design_architecture_review.json
      - delivery_plan.json
      - delivery_plan_review.json
      - docs_quality.json
    required_gate_artifacts:
      - artifact: spec.json
        accepted_decisions:
          - ready_for_design
          - pass
      - artifact: technical_design.json
      - artifact: architecture_design.json
      - artifact: test_design.json
      - artifact: test_data_plan.json
      - artifact: docs_quality.json
        accepted_decisions:
          - pass
          - ready
      - artifact: design_architecture_review.json
        accepted_decisions:
          - pass
          - approved
        readiness_path: readiness_gate.implementation_allowed
        readiness_value: true
      - artifact: delivery_plan_review.json
        accepted_decisions:
          - pass
        readiness_path: readiness_gate.implementation_allowed
        readiness_value: true
    next_safe_command: python3 skills/core/delivery-runner/scripts/delivery_runner.py inspect --artifact-dir artifacts/REQ-001
    notes:
      - design review passes
      - delivery plan review passes
      - git evidence is ready
      - edit permit is ready
  - name: frontend_change
    trigger_impacts:
      - ui
    required_skills:
      - spec-governor
      - technical-design-governor
      - architecture-design-governor
      - test-design-governor
      - test-data-governor
      - design-architecture-reviewer
      - delivery-plan-templates
      - delivery-plan-reviewer
      - frontend-acceptance-runner
      - test-evidence-gate
    optional_skills:
      - code-review-gate
    expected_artifacts:
      - spec.json
      - technical_design.json
      - architecture_design.json
      - test_design.json
      - test_data_plan.json
      - design_architecture_review.json
      - delivery_plan.json
      - delivery_plan_review.json
      - docs_quality.json
      - frontend_acceptance.json
      - test_evidence_gate.json
    artifact_steps:
      - name: frontend_acceptance_template
        artifact: frontend_acceptance.json
        command:
          - python3
          - skills/core/frontend-acceptance-runner/scripts/frontend_acceptance.py
          - template
          - --page-type
          - custom
          - --target-url
          - http://localhost/TBD
          - --artifact-dir
          - "{artifact_dir}"
          - --out
          - "{artifact_dir}/frontend_acceptance.json"
      - name: test_evidence_gate
        artifact: test_evidence_gate.json
        allow_fail: true
        command:
          - python3
          - skills/core/test-evidence-gate/scripts/test_evidence_gate.py
          - --artifact-dir
          - "{artifact_dir}"
          - --out
          - "{artifact_dir}/test_evidence_gate.json"
          - --require-frontend
    required_gate_artifacts:
      - artifact: spec.json
        accepted_decisions:
          - ready_for_design
          - pass
      - artifact: technical_design.json
      - artifact: architecture_design.json
      - artifact: test_design.json
      - artifact: test_data_plan.json
      - artifact: docs_quality.json
        accepted_decisions:
          - pass
          - ready
      - artifact: design_architecture_review.json
        accepted_decisions:
          - pass
          - approved
        readiness_path: readiness_gate.implementation_allowed
        readiness_value: true
      - artifact: delivery_plan_review.json
        accepted_decisions:
          - pass
        readiness_path: readiness_gate.implementation_allowed
        readiness_value: true
      - artifact: frontend_acceptance.json
        accepted_decisions:
          - pass
          - ready
      - artifact: test_evidence_gate.json
        accepted_decisions:
          - pass
          - ready
    next_safe_command: python3 skills/core/frontend-acceptance-runner/scripts/frontend_acceptance.py template --out artifacts/REQ-001/frontend_acceptance.json
    notes:
      - frontend acceptance scope is planned
      - delivery plan review passes
      - edit permit is ready
  - name: cross_repo_api
    trigger_impacts:
      - api
    required_skills:
      - project-understanding-runner
      - spec-governor
      - technical-design-governor
      - architecture-design-governor
      - test-design-governor
      - test-data-governor
      - design-architecture-reviewer
      - delivery-plan-templates
      - delivery-plan-reviewer
      - traceability-governor
      - release-evidence-binder
    optional_skills:
      - api-surface-extractor
      - code-review-gate
    expected_artifacts:
      - project_understanding/baseline_quality.json
      - spec.json
      - technical_design.json
      - architecture_design.json
      - test_design.json
      - test_data_plan.json
      - design_architecture_review.json
      - delivery_plan.json
      - delivery_plan_review.json
      - docs_quality.json
    required_gate_artifacts:
      - artifact: project_understanding/baseline_quality.json
        accepted_decisions:
          - pass
          - ready
      - artifact: spec.json
        accepted_decisions:
          - ready_for_design
          - pass
      - artifact: technical_design.json
      - artifact: architecture_design.json
      - artifact: test_design.json
      - artifact: test_data_plan.json
      - artifact: docs_quality.json
        accepted_decisions:
          - pass
          - ready
      - artifact: design_architecture_review.json
        accepted_decisions:
          - pass
          - approved
        readiness_path: readiness_gate.implementation_allowed
        readiness_value: true
      - artifact: delivery_plan_review.json
        accepted_decisions:
          - pass
        readiness_path: readiness_gate.implementation_allowed
        readiness_value: true
    next_safe_command: python3 skills/core/delivery-runner/scripts/delivery_runner.py inspect --artifact-dir artifacts/REQ-001
    notes:
      - project understanding exists
      - cross-repo contracts are reviewed
      - delivery plan review passes
  - name: data_migration
    trigger_impacts:
      - data
    required_skills:
      - spec-governor
      - technical-design-governor
      - architecture-design-governor
      - test-design-governor
      - test-data-governor
      - design-architecture-reviewer
      - delivery-plan-templates
      - delivery-plan-reviewer
      - configuration-governor
      - data-security-governor
      - performance-governor
      - release-evidence-binder
    optional_skills:
      - environment-promotion-governor
      - uat-acceptance-governor
    expected_artifacts:
      - spec.json
      - technical_design.json
      - architecture_design.json
      - test_design.json
      - test_data_plan.json
      - design_architecture_review.json
      - delivery_plan.json
      - delivery_plan_review.json
      - docs_quality.json
      - configuration_readiness.json
      - data_security_review.json
      - performance_review.json
      - release_gate.json
    artifact_steps:
      - name: configuration_review
        artifact: configuration_readiness.json
        allow_fail: true
        command:
          - python3
          - skills/core/configuration-governor/scripts/configuration.py
          - analyze
          - --spec
          - "{artifact_dir}/spec.json"
          - --technical-design
          - "{artifact_dir}/technical_design.json"
          - --architecture-design
          - "{artifact_dir}/architecture_design.json"
          - --out
          - "{artifact_dir}/configuration_readiness.json"
      - name: data_security_review
        artifact: data_security_review.json
        allow_fail: true
        command:
          - python3
          - skills/core/data-security-governor/scripts/data_security.py
          - design
          - --spec
          - "{artifact_dir}/spec.json"
          - --technical-design
          - "{artifact_dir}/technical_design.json"
          - --architecture-design
          - "{artifact_dir}/architecture_design.json"
          - --out
          - "{artifact_dir}/data_security_review.json"
      - name: performance_review
        artifact: performance_review.json
        allow_fail: true
        command:
          - python3
          - skills/core/performance-governor/scripts/performance.py
          - design
          - --spec
          - "{artifact_dir}/spec.json"
          - --technical-design
          - "{artifact_dir}/technical_design.json"
          - --architecture-design
          - "{artifact_dir}/architecture_design.json"
          - --out
          - "{artifact_dir}/performance_review.json"
      - name: release_evidence_binder
        artifact: release_gate.json
        allow_fail: true
        command:
          - python3
          - skills/core/release-evidence-binder/scripts/bind_release.py
          - --artifact-dir
          - "{artifact_dir}"
          - --out
          - "{artifact_dir}/release_gate.json"
    required_gate_artifacts:
      - artifact: spec.json
        accepted_decisions:
          - ready_for_design
          - pass
      - artifact: technical_design.json
      - artifact: architecture_design.json
      - artifact: test_design.json
      - artifact: test_data_plan.json
      - artifact: docs_quality.json
        accepted_decisions:
          - pass
          - ready
      - artifact: design_architecture_review.json
        accepted_decisions:
          - pass
          - approved
        readiness_path: readiness_gate.implementation_allowed
        readiness_value: true
      - artifact: delivery_plan_review.json
        accepted_decisions:
          - pass
        readiness_path: readiness_gate.implementation_allowed
        readiness_value: true
      - artifact: release_gate.json
        accepted_decisions:
          - go
          - conditional_go
    next_safe_command: python3 skills/core/delivery-runner/scripts/delivery_runner.py inspect --artifact-dir artifacts/REQ-001
    notes:
      - data design and rollback are reviewed
      - configuration/security/performance evidence is planned
  - name: release_readiness
    trigger_lanes:
      - release
    required_skills:
      - implementation-completion-gate
      - post-change-skill-sync
      - code-review-gate
      - test-evidence-gate
      - environment-promotion-governor
      - uat-acceptance-governor
      - release-change-governor
      - release-evidence-binder
    optional_skills:
      - post-release-observer
    expected_artifacts:
      - implementation_completion_gate.json
      - post_change_implementation_report.json
      - code_review_gate.json
      - test_evidence_gate.json
      - environment_promotion.json
      - uat_acceptance.json
      - release_change.json
      - release_gate.json
    profile_stage_mode: release_only
    artifact_steps:
      - name: environment_promotion_template
        artifact: environment_promotion.json
        command:
          - python3
          - skills/core/environment-promotion-governor/scripts/environment_promotion.py
          - template
          - --out
          - "{artifact_dir}/environment_promotion.json"
      - name: uat_acceptance_template
        artifact: uat_acceptance.json
        command:
          - python3
          - skills/core/uat-acceptance-governor/scripts/uat_acceptance.py
          - template
          - --out
          - "{artifact_dir}/uat_acceptance.json"
      - name: release_change_template
        artifact: release_change.json
        command:
          - python3
          - skills/core/release-change-governor/scripts/release_change.py
          - template
          - --out
          - "{artifact_dir}/release_change.json"
      - name: release_evidence_binder
        artifact: release_gate.json
        allow_fail: true
        command:
          - python3
          - skills/core/release-evidence-binder/scripts/bind_release.py
          - --artifact-dir
          - "{artifact_dir}"
          - --out
          - "{artifact_dir}/release_gate.json"
    required_gate_artifacts:
      - artifact: implementation_completion_gate.json
        accepted_decisions:
          - pass
          - ready
      - artifact: post_change_implementation_report.json
        accepted_decisions:
          - pass
          - warn
      - artifact: code_review_gate.json
        accepted_decisions:
          - pass
          - approved
      - artifact: test_evidence_gate.json
        accepted_decisions:
          - pass
          - ready
      - artifact: environment_promotion.json
        accepted_decisions:
          - pass
          - ready
      - artifact: uat_acceptance.json
        accepted_decisions:
          - pass
          - ready
      - artifact: release_change.json
        accepted_decisions:
          - pass
          - ready
      - artifact: release_gate.json
        accepted_decisions:
          - go
          - conditional_go
    next_safe_command: python3 skills/core/release-evidence-binder/scripts/bind_release.py --artifact-dir artifacts/REQ-001 --out artifacts/REQ-001/release_gate.json
    notes:
      - implementation is complete
      - review and tests pass
      - release evidence binder returns go
